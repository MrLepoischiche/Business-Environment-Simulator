# Dans .github/workflows/integration.yml
name: Integration Tests
on: [push, pull_request]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Run NORMA Integration Tests
        run: |
          chmod +x integration_tests/run_integration_tests.sh
          ./integration_tests/run_integration_tests.sh --format pytest
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: integration_tests/results_*/