# Production Deployment Pipeline - Banking Simulator
name: Production Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      region:
        description: 'Target region (all for global deployment)'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - eu-west-1
        - westeurope
        - europe-west1

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: banking-simulator
  TERRAFORM_VERSION: 1.5.0
  KUBECTL_VERSION: v1.28.0
  HELM_VERSION: v3.12.0

jobs:
  security-scan:
    name: Security & Compliance Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: GDPR Compliance Check
      run: |
        echo "Checking GDPR compliance..."
        python3 scripts/gdpr_compliance_check.py
    
    - name: License Compliance Check
      uses: fossa-contrib/fossa-action@v2
      with:
        fossa-api-key: ${{ secrets.FOSSA_API_KEY }}

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      matrix:
        component: [api, worker, frontend]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.${{ matrix.component }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
          REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_banking_simulator
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r integration_tests/requirements.txt
    
    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://postgres:test@localhost:5432/test_banking_simulator
        REDIS_URL: redis://localhost:6379
        DEMO_API_URL: http://localhost:8000
      run: |
        chmod +x integration_tests/run_integration_tests.sh
        ./integration_tests/run_integration_tests.sh --format pytest
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: integration_tests/results_*/

  performance-tests:
    name: Performance & Load Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Locust
      run: pip install locust
    
    - name: Run load tests
      run: |
        locust -f tests/load/locustfile.py \
          --host http://localhost:8000 \
          --users 1000 \
          --spawn-rate 10 \
          --run-time 300s \
          --headless \
          --html performance-report.html
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: performance-report.html

  infrastructure-deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [integration-tests, performance-tests]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: 
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://app.banking-simulator.com
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-1
    
    - name: Configure Azure credentials
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Configure GCP credentials
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
    
    - name: Terraform Init
      working-directory: terraform
      run: terraform init
    
    - name: Terraform Plan
      working-directory: terraform
      run: |
        terraform plan \
          -var="environment=${{ github.event.inputs.environment || 'production' }}" \
          -out=tfplan
    
    - name: Terraform Apply
      working-directory: terraform
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
      run: terraform apply -auto-approve tfplan
    
    - name: Save Terraform outputs
      working-directory: terraform
      run: |
        terraform output -json > ../terraform-outputs.json
    
    - name: Upload Terraform outputs
      uses: actions/upload-artifact@v3
      with:
        name: terraform-outputs
        path: terraform-outputs.json

  application-deploy:
    name: Deploy Applications
    runs-on: ubuntu-latest
    needs: infrastructure-deploy
    strategy:
      matrix:
        region: ${{ fromJSON(github.event.inputs.region == 'all' && '["eu-west-1", "westeurope", "europe-west1"]' || format('["{0}"]', github.event.inputs.region || 'eu-west-1')) }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Terraform outputs
      uses: actions/download-artifact@v3
      with:
        name: terraform-outputs
        path: .
    
    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: ${{ env.KUBECTL_VERSION }}
    
    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: ${{ env.HELM_VERSION }}
    
    - name: Configure kubectl
      run: |
        # Extract cluster credentials from Terraform outputs
        CLUSTER_ENDPOINT=$(cat terraform-outputs.json | jq -r '.cluster_endpoints.value["${{ matrix.region }}"]')
        
        # Configure kubectl based on cloud provider
        if [[ "${{ matrix.region }}" == "eu-west-1" ]]; then
          aws eks update-kubeconfig --region eu-west-1 --name banking-simulator-cluster
        elif [[ "${{ matrix.region }}" == "westeurope" ]]; then
          az aks get-credentials --resource-group banking-simulator --name banking-simulator-cluster
        elif [[ "${{ matrix.region }}" == "europe-west1" ]]; then
          gcloud container clusters get-credentials banking-simulator-cluster --zone europe-west1 --project banking-simulator
        fi
    
    - name: Deploy with Helm
      run: |
        helm upgrade --install banking-simulator ./helm/banking-simulator \
          --namespace banking-simulator \
          --create-namespace \
          --set global.environment="${{ github.event.inputs.environment || 'production' }}" \
          --set global.region="${{ matrix.region }}" \
          --set image.tag="${{ github.sha }}" \
          --set ingress.hosts[0].host="api-${{ matrix.region }}.banking-simulator.com" \
          --values ./helm/banking-simulator/values-${{ github.event.inputs.environment || 'production' }}.yaml \
          --timeout 10m \
          --wait
    
    - name: Verify deployment
      run: |
        kubectl rollout status deployment/banking-simulator-api -n banking-simulator --timeout=300s
        kubectl rollout status deployment/banking-simulator-workers -n banking-simulator --timeout=300s
    
    - name: Run smoke tests
      run: |
        ENDPOINT="https://api-${{ matrix.region }}.banking-simulator.com"
        curl -f "$ENDPOINT/health" || exit 1
        curl -f "$ENDPOINT/api/scenarios" || exit 1
        echo "Smoke tests passed for ${{ matrix.region }}"

  monitoring-deploy:
    name: Deploy Monitoring Stack
    runs-on: ubuntu-latest
    needs: application-deploy
    strategy:
      matrix:
        region: ${{ fromJSON(github.event.inputs.region == 'all' && '["eu-west-1", "westeurope", "europe-west1"]' || format('["{0}"]', github.event.inputs.region || 'eu-west-1')) }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install kubectl & Helm
      uses: azure/setup-kubectl@v3
      with:
        version: ${{ env.KUBECTL_VERSION }}
    
    - uses: azure/setup-helm@v3
      with:
        version: ${{ env.HELM_VERSION }}
    
    - name: Configure kubectl for ${{ matrix.region }}
      run: |
        # Configure kubectl based on region/cloud
        if [[ "${{ matrix.region }}" == "eu-west-1" ]]; then
          aws eks update-kubeconfig --region eu-west-1 --name banking-simulator-cluster
        elif [[ "${{ matrix.region }}" == "westeurope" ]]; then
          az aks get-credentials --resource-group banking-simulator --name banking-simulator-cluster
        elif [[ "${{ matrix.region }}" == "europe-west1" ]]; then
          gcloud container clusters get-credentials banking-simulator-cluster --zone europe-west1 --project banking-simulator
        fi
    
    - name: Add Helm repositories
      run: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo add grafana https://grafana.github.io/helm-charts
        helm repo add jaegertracing https://jaegertracing.github.io/helm-charts
        helm repo update
    
    - name: Deploy Prometheus Stack
      run: |
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --create-namespace \
          --values ./helm/monitoring/prometheus-values.yaml \
          --set global.region="${{ matrix.region }}" \
          --timeout 10m \
          --wait
    
    - name: Deploy Grafana
      run: |
        helm upgrade --install grafana grafana/grafana \
          --namespace monitoring \
          --values ./helm/monitoring/grafana-values.yaml \
          --set global.region="${{ matrix.region }}" \
          --timeout 10m \
          --wait
    
    - name: Deploy Jaeger
      run: |
        helm upgrade --install jaeger jaegertracing/jaeger \
          --namespace monitoring \
          --values ./helm/monitoring/jaeger-values.yaml \
          --set global.region="${{ matrix.region }}" \
          --timeout 10m \
          --wait

  post-deployment-tests:
    name: Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: [application-deploy, monitoring-deploy]
    steps:
    - uses: actions/checkout@v4
    
    - name: Wait for deployment stabilization
      run: sleep 60
    
    - name: Run end-to-end tests
      run: |
        python3 -m pytest tests/e2e/ \
          --base-url https://api.banking-simulator.com \
          --html=e2e-report.html \
          --self-contained-html
    
    - name: Check monitoring endpoints
      run: |
        curl -f "https://grafana.banking-simulator.com/api/health" || exit 1
        curl -f "https://prometheus.banking-simulator.com/api/v1/status/config" || exit 1
    
    - name: Validate performance benchmarks
      run: |
        python3 scripts/performance_validation.py \
          --endpoint https://api.banking-simulator.com \
          --min-throughput 100 \
          --max-latency 100
    
    - name: Upload validation results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: post-deployment-validation
        path: |
          e2e-report.html
          performance-validation.json

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: post-deployment-tests
    if: always()
    steps:
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        username: 'Banking Simulator Deploy Bot'
        icon_emoji: ':rocket:'
        text: |
          Production Deployment ${{ job.status }}
          Environment: ${{ github.event.inputs.environment || 'production' }}
          Region: ${{ github.event.inputs.region || 'all' }}
          Version: ${{ github.sha }}
          Triggered by: ${{ github.actor }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
    
    - name: Update deployment status
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: context.payload.deployment?.id || 'manual',
            state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
            environment_url: 'https://app.banking-simulator.com',
            description: 'Banking Simulator deployment ${{ job.status }}'
          });
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/v') && success()
      with:
        draft: false
        generate_release_notes: true
        files: |
          terraform-outputs.json
          performance-report.html